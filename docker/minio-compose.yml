# Local MinIO test harness for the Kindred backup/restore flow.
# Brought up by scripts/dev-backup.sh; torn down at the end.
# MinIO S3 API:   http://localhost:${MINIO_PORT:-9000}
# MinIO console:    http://localhost:${MINIO_CONSOLE_PORT:-9001}  (user: minioadmin / pass: minioadmin)
# Pre-created bucket: kindred-test  (via the `mc` sidecar below)
#
# This stack uses ephemeral volumes — no host paths are bound. Safe to
# bring up and tear down repeatedly.
#
# Port override: set MINIO_PORT and MINIO_CONSOLE_PORT env vars before
# `docker compose up` to avoid conflicts on the host (e.g.:
#   MINIO_PORT=9100 MINIO_CONSOLE_PORT=9101 docker compose ... up

services:
  minio:
    image: minio/minio:latest
    container_name: kindred-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  # One-shot sidecar: waits for MinIO, creates the test bucket, exits.
  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/kindred-test &&
        echo 'bucket created' ;
      "
    restart: "no"